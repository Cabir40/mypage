title: "Enhancing Retrieval-Augmented Generation: Optimizing Document Splits and Parameters for Improved Language Model Responses"
venue: "M.Sc. Thesis — Atılım University, 2024"
link: ""
tag: Thesis
tldr: >
  Investigated sentence-aware splitting algorithms and parameter optimization
  (Split Length, Top-K, Window Size) for RAG-powered healthcare LLM assistants,
  showing that sentence-aware splitting significantly outperforms
  character-based methods for clinical document retrieval.
citation: >
