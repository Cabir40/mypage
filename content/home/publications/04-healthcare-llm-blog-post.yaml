title: "Harnessing Healthcare-Specific LLMs for Clinical Entity Extraction"
venue: "John Snow Labs Blog — January 2025"
link: "https://www.johnsnowlabs.com/harnessing-healthcare-specific-llms-for-clinical-entity-extraction/"
tag: Blog post
tldr: >
  A practical look at using domain-specific LLMs to pull structured clinical
  entities — diagnoses, medications, procedures — out of unstructured medical
  text, and why purpose-built healthcare models outperform general-purpose LLMs
  on this task.
